<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RPG Habit Tracker</title>
    <style>
        body { background: #0f172a; color: white; font-family: -apple-system, system-ui, sans-serif; display: flex; justify-content: center; padding: 15px; margin: 0; }
        .card { background: #1e293b; padding: 20px; border-radius: 24px; width: 100%; max-width: 380px; text-align: center; border: 2px solid #38bdf8; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .avatar { width: 160px; height: 160px; margin: 0 auto 15px; border-radius: 20px; overflow: hidden; background: #334155; border: 3px solid #38bdf8; }
        img { width: 100%; height: 100%; object-fit: cover; }
        .bar-bg { background: #334155; height: 12px; border-radius: 6px; margin: 15px 0; overflow: hidden; }
        #bar-fill { background: #38bdf8; height: 100%; width: 0%; transition: 0.8s ease-out; }
        .task { background: #1e293b; padding: 12px; margin: 10px 0; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #334155; -webkit-tap-highlight-color: transparent; }
        button { background: #38bdf8; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; color: #0f172a; font-size: 14px; }
        button:disabled { background: #10b981; color: white; opacity: 0.8; }
        .info { font-size: 12px; color: #94a3b8; }
        h2 { margin: 5px 0; font-size: 20px; }
    </style>
</head>
<body>

<div class="card">
    <div class="info">НЕДЕЛЯ <span id="week-num">1</span></div>
    <div class="avatar"><img id="pic" src="lvl1.png"></div>
    <h2 id="name">Загрузка...</h2>
    <div class="info">XP: <span id="xp">0</span> / <span id="next">500</span></div>
    <div class="bar-bg"><div id="bar-fill"></div></div>
    
    <div id="task-list"></div>

    <div style="margin-top: 20px; opacity: 0.3;">
        <button onclick="if(confirm('Сбросить?')) { localStorage.clear(); location.reload(); }" style="background:none; color:white; font-size:9px;">СБРОС ДАННЫХ</button>
    </div>
</div>

<script>
    let state = JSON.parse(localStorage.getItem('rpg_mobile_v1')) || { xp: 0, completedToday: [] };

    const today = new Date().toDateString();
    if (localStorage.getItem('last_day') !== today) {
        state.completedToday = [];
        localStorage.setItem('last_day', today);
    }

    const levels = [
        { xp: 0,    name: "Новичок (Неделя 1)", img: "lvl1.png", week: 1, target: 500 },
        { xp: 500,  name: "Исследователь (Неделя 2)", img: "lvl2.png", week: 2, target: 1000 },
        { xp: 1000, name: "Воин (Неделя 3)", img: "lvl3.png", week: 3, target: 1500 },
        { xp: 1500, name: "Титан (Неделя 4)", img: "lvl4.png", week: 4, target: 2000 }
    ];

    const tasks = [
        { id: 't1', txt: "💧 Вода", pts: 10 },
        { id: 't2', txt: "🤸‍♂️ Разминка", pts: 15 },
        { id: 't3', txt: "🎧 Прогулка", pts: 25 },
        { id: 't4', txt: "🥗 Овощи", pts: 20 }
    ];

    function render() {
        const stage = [...levels].reverse().find(l => state.xp >= l.xp) || levels[0];
        const next = levels.find(l => l.xp > state.xp) || { xp: state.xp + 500 };
        
        document.getElementById('pic').src = stage.img;
        document.getElementById('name').innerText = stage.name;
        document.getElementById('week-num').innerText = stage.week;
        document.getElementById('xp').innerText = state.xp;
        document.getElementById('next').innerText = next.xp;
        document.getElementById('bar-fill').style.width = Math.min(100, (state.xp / next.xp) * 100) + '%';
        
        localStorage.setItem('rpg_mobile_v1', JSON.stringify(state));
        renderTasks();
    }

    function renderTasks() {
        const list = document.getElementById('task-list');
        list.innerHTML = '';
        tasks.forEach(t => {
            const isDone = state.completedToday.includes(t.id);
            const item = document.createElement('div');
            item.className = 'task';
            item.innerHTML = `
                <span>${t.txt}</span>
                <button ${isDone ? 'disabled' : ''} onclick="doTask('${t.id}', ${t.pts})">
                    ${isDone ? '✓' : '+' + t.pts}
                </button>
            `;
            list.appendChild(item);
        });
    }

    function doTask(id, pts) {
        // Виброотклик (Haptic Feedback)
        if (window.navigator.vibrate) window.navigator.vibrate(50);
        
        state.xp += pts;
        state.completedToday.push(id);
        render();
    }

    render();
</script>

</body>
</html>
