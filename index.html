<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RPG Habit Tracker</title>
    
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪖</text></svg>">

    <style>
        body { 
            background: #0f172a; 
            color: white; 
            font-family: -apple-system, system-ui, sans-serif; 
            display: flex; 
            justify-content: center; 
            padding: 15px; 
            margin: 0;
            min-height: 100vh;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }
        
        .card { 
            background: #1e293b; 
            padding: 20px; 
            border-radius: 24px; 
            width: 100%; 
            max-width: 380px; 
            text-align: center; 
            border: 2px solid #38bdf8; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); 
            position: relative;
            box-sizing: border-box;
        }

        .avatar { 
            width: 160px; 
            height: 160px; 
            margin: 0 auto 15px; 
            border-radius: 20px; 
            overflow: hidden; 
            background: #334155; 
            border: 3px solid #38bdf8;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #pic { width: 100%; height: 100%; object-fit: cover; }
        
        .bar-bg { background: #334155; height: 14px; border-radius: 7px; margin: 15px 0; overflow: hidden; }
        #bar-fill { background: #38bdf8; height: 100%; width: 0%; transition: 0.8s ease; }
        
        .task { 
            background: #1e293b; 
            padding: 16px; 
            margin: 10px 0; 
            border-radius: 16px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid #334155; 
            text-align: left;
        }

        button { 
            background: #38bdf8; 
            border: none; 
            padding: 12px 18px; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            color: #0f172a; 
            font-size: 14px;
        }
        
        button:disabled { background: #10b981; color: white; cursor: default; }
        .info { font-size: 13px; color: #94a3b8; }
        h2 { margin: 5px 0; font-size: 20px; }
