<script>
    (function() {
        try {
            const levels = [
                { xp: 0,    name: "Новичок (Неделя 1)", img: "lvl1.png", week: 1, target: 500 },
                { xp: 500,  name: "Исследователь (Неделя 2)", img: "lvl2.png", week: 2, target: 1000 },
                { xp: 1000, name: "Воин (Неделя 3)", img: "lvl3.png", week: 3, target: 1500 },
                { xp: 1500, name: "Титан (Неделя 4)", img: "lvl4.png", week: 4, target: 2000 }
            ];

            const tasks = [
                { id: 't1', txt: "💧 Вода перед едой", pts: 10 },
                { id: 't2', txt: "🤸‍♂️ Разминка 5 мин", pts: 15 },
                { id: 't3', txt: "🎧 Прогулка 15 мин", pts: 25 },
                { id: 't4', txt: "🥗 Овощи в тарелке", pts: 20 }
            ];

            const quotes = [
                "Саша, сегодня ты отыграл роль конферансье на 10/10!",
                "Вьетнам всё ближе! Дисциплина — твой билет.",
                "Твой контент сегодня — огонь. Зрители в восторге!",
                "На шаг ближе к 50к подписчиков. Так держать!",
                "Мастер церемоний в деле: день под твоим контролем!",
                "Чистая победа! Оля будет гордиться тобой.",
                "Уровень дисциплины: ТИТАН. Вьетнам ждет!"
            ];

            let state = JSON.parse(localStorage.getItem('rpg_weekly_v3')) || { xp: 0, completedToday: [] };
            const today = new Date().toDateString();
            if (localStorage.getItem('rpg_last_date') !== today) {
                state.completedToday = [];
                localStorage.setItem('rpg_last_date', today);
            }

            function vibrate(pattern) {
                if (navigator.vibrate) {
                    navigator.vibrate(pattern);
                }
            }

            function render() {
                const stage = [...levels].reverse().find(l => state.xp >= l.xp) || levels[0];
                const nextStage = levels.find(l => l.xp > state.xp) || { xp: state.xp + 500 };
                
                document.getElementById('pic').src = stage.img;
                document.getElementById('name-display').innerText = stage.name;
                document.getElementById('week-num').innerText = stage.week;
                document.getElementById('xp-val').innerText = state.xp;
                document.getElementById('next-val').innerText = nextStage.xp;
                document.getElementById('bar-fill').style.width = Math.min(100, (state.xp / nextStage.xp) * 100) + '%';
                
                localStorage.setItem('rpg_weekly_v3', JSON.stringify(state));
                localStorage.setItem('rpg_last_date', today);

                const list = document.getElementById('task-list');
                list.innerHTML = '';
                tasks.forEach(t => {
                    const isDone = state.completedToday.includes(t.id);
                    const div = document.createElement('div');
                    div.className = 'task';
                    div.innerHTML = `
                        <span>${t.txt}</span>
                        <button class="${isDone ? 'btn-done' : 'btn-active'}">
                            ${isDone ? '✓' : '+' + t.pts}
                        </button>
                    `;
                    div.querySelector('button').onclick = () => toggleTask(t.id, t.pts);
                    list.appendChild(div);
                });
            }

            function toggleTask(id, pts) {
                const index = state.completedToday.indexOf(id);
                if (index > -1) {
                    // Отмена: короткая вибрация 30мс
                    vibrate(30);
                    state.xp -= pts;
                    if (state.xp < 0) state.xp = 0;
                    state.completedToday.splice(index, 1);
                } else {
                    // Выполнение: двойная вибрация (60мс вибро, 40мс пауза, 60мс вибро)
                    vibrate([60, 40, 60]);
                    state.xp += pts;
                    state.completedToday.push(id);
                    
                    if (state.completedToday.length === tasks.length) {
                        // ФИНАЛ ДНЯ: длинная вибрация 300мс
                        setTimeout(() => vibrate(300), 500);
                        document.getElementById('congrats-text').innerText = quotes[Math.floor(Math.random() * quotes.length)];
                        document.getElementById('overlay').style.display = 'flex';
                    }
                }
                render();
            }

            document.getElementById('error-msg').style.display = 'none';
            document.getElementById('app-card').style.display = 'block';
            render();

        } catch (err) {
            document.getElementById('error-msg').innerText = "Ошибка: " + err.message;
        }
    })();
</script>
