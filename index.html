<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RPG Habit Tracker: Weekly</title>
    <style>
        body { 
            background: #0f172a; 
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            padding: 15px; 
            margin: 0;
            min-height: 100vh;
            /* Запрет выделения текста для имитации нативного приложения */
            -webkit-user-select: none;
            user-select: none;
        }
        
        .card { 
            background: #1e293b; 
            padding: 20px; 
            border-radius: 24px; 
            width: 100%; 
            max-width: 380px; /* Ограничение для больших экранов */
            text-align: center; 
            border: 2px solid #38bdf8; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
            position: relative;
            box-sizing: border-box;
        }

        .avatar { 
            width: 150px; 
            height: 150px; 
            margin: 0 auto 15px; 
            border-radius: 20px; 
            overflow: hidden; 
            background: #334155; 
            border: 3px solid #38bdf8; 
        }
        
        img { width: 100%; height: 100%; object-fit: cover; }
        
        .bar-bg { background: #334155; height: 14px; border-radius: 7px; margin: 15px 0; overflow: hidden; }
        #bar-fill { background: #38bdf8; height: 100%; width: 0%; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .task { 
            background: #1e293b; 
            padding: 16px; 
            margin: 10px 0; 
            border-radius: 16px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid #334155; 
            text-align: left;
        }

        button { 
            background: #38bdf8; 
            border: none; 
            padding: 10px 16px; 
            border-radius: 10px; 
            font-weight: bold; 
            cursor: pointer; 
            color: #0f172a; 
            font-size: 14px;
            touch-action: manipulation; /* Убирает задержку клика на мобильных */
        }
        
        button:disabled { background: #10b981; color: white; cursor: default; }
        
        .info { font-size: 13px; color: #94a3b8; margin-bottom: 5px; }
        h2 { margin: 5px 0; font-size: 20px; }

        /* Окно поздравления */
