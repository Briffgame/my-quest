<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RPG Habit Tracker</title>
    
    <!-- Подключение твоей иконки -->
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <!-- Запасной вариант (эмодзи), если основной файл не подгрузится -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪖</text></svg>">

    <style>
        body { background: #0f172a; color: white; font-family: -apple-system, sans-serif; display: flex; justify-content: center; padding: 15px; margin: 0; min-height: 100vh; -webkit-user-select: none; user-select: none; }
        .card { background: #1e293b; padding: 20px; border-radius: 24px; width: 100%; max-width: 380px; text-align: center; border: 2px solid #38bdf8; box-shadow: 0 20px 40px rgba(0,0,0,0.5); position: relative; box-sizing: border-box; }
        .avatar { width: 150px; height: 150px; margin: 0 auto 15px; border-radius: 20px; overflow: hidden; background: #334155; border: 3px solid #38bdf8; display: flex; align-items: center; justify-content: center; }
        #pic { width: 100%; height: 100%; object-fit: cover; }
        .bar-bg { background: #334155; height: 12px; border-radius: 6px; margin: 15px 0; overflow: hidden; }
        #bar-fill { background: #38bdf8; height: 100%; width: 0%; transition: 0.8s ease; }
        .task { background: #1e293b; padding: 14px; margin: 10px 0; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #334155; text-align: left; }
        button { border: none; padding: 12px 18px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .btn-active { background: #38bdf8; color: #0f172a; }
        .btn-done { background: #10b981; color: white; }
        .info { font-size: 13px; color: #94a3b8; }
        h2 { margin: 5px 0; font-size: 18px; }
        #overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.98); border-radius: 22px; flex-direction: column; justify-content: center; align-items: center; padding: 25px; z-index: 10; box-sizing: border-box; border: 2px solid #10b981; }
        .reset-btn { background: none; color: #475569; font-size: 10px; border: 1px solid #334155; margin-top: 20px; padding: 5px 10px; border-radius: 6px; }
    </style>
</head>
<body>

<div class="card" id="main-app" style="display:none;">
    <div id="overlay">
        <h3 style="color: #10b981;">🏆 ДЕНЬ ЗАВЕРШЕН!</h3>
        <p id="congrats-text" style="font-style: italic; line-height: 1.4;"></p>
        <button onclick="document.getElementById('overlay').style.display='none'" class="btn-done" style="margin-top:20px; width: 100%;">ВПЕРЁД!</button>
    </div>

    <div class="info">НЕДЕЛЯ <span id="week-num">1</span></div>
    <div class="avatar"><img id="pic" src="lvl1.png" onerror="this.src='https://via.placeholder.com/150?text=Герой'"></div>
    <h2 id="name-display">Загрузка...</h2>
    <div class="info">XP: <span id="xp-val">0</span> / <span id="next-val">500</span></div>
    <div class="bar-bg"><div id="bar-fill"></div></div>
    <div id="task-list"></div>
    <button class="reset-btn" onclick="if(confirm('Сбросить прогресс?')) { localStorage.clear(); location.reload(); }">СБРОСИТЬ ВСЁ</button>
</div>

<div id="loader" style="text-align: center; padding: 50px;">Синхронизация...</div>

<script>
    (function() {
        try {
            const levels = [
                { xp: 0,    name: "Новичок (Неделя 1)", img: "lvl1.png", week: 1, target: 500 },
                { xp: 500,  name: "Исследователь (Неделя 2)", img: "lvl2.png", week: 2, target: 1000 },
                { xp: 1000, name: "Воин (Неделя 3)", img: "lvl3.png", week: 3, target: 1500 },
                { xp: 1500, name: "Титан (Неделя 4)", img: "lvl4.png", week: 4, target: 2000 }
            ];

            const tasks = [
                { id: 't1', txt: "💧 Вода перед едой", pts: 10 },
                { id: 't2', txt: "🤸‍♂️ Разминка 5 мин", pts: 15 },
                { id: 't3', txt: "🎧 Прогулка 15 мин", pts: 25 },
                { id: 't4', txt: "🥗 Овощи в тарелке", pts: 20 }
            ];

            const quotes = [
                "Саша, сегодня ты отыграл роль конферансье на 10/10!",
                "Вьетнам всё ближе! Дисциплина — твой билет.",
                "Твой контент сегодня — огонь. Зрители в восторге!",
                "На шаг ближе к 50к подписчиков. Так держать!",
                "Мастер церемоний в деле: день под твоим контролем!",
                "Чистая победа! Оля будет гордиться тобой.",
                "Уровень дисциплины: ТИТАН. Вьетнам ждет!"
            ];

            let state = JSON.parse(localStorage.getItem('rpg_weekly_v3')) || { xp: 0, completedToday: [] };
            const today = new Date().toDateString();
            if (localStorage.getItem('rpg_last_date') !== today) {
                state.completedToday = [];
                localStorage.setItem('rpg_last_date', today);
            }

            function vibrate(p) { if(navigator.vibrate) navigator.vibrate(p); }

            function render() {
                const stage = [...levels].reverse().find(l => state.xp >= l.xp) || levels[0];
                const nextStage = levels.find(l => l.xp > state.xp) || { xp: state.xp + 500 };
                
                document.getElementById('pic').src = stage.img;
                document.getElementById('name-display').innerText = stage.name;
                document.getElementById('week-num').innerText = stage.week;
                document.getElementById('xp-val').innerText = state.xp;
                document.getElementById('next-val').innerText = nextStage.xp;
                document.getElementById('bar-fill').style.width = Math.min(100, (state.xp / nextStage.xp) * 100) + '%';
                
                localStorage.setItem('rpg_weekly_v3', JSON.stringify(state));
                localStorage.setItem('rpg_last_date', today);

                const list = document.getElementById('task-list');
                list.innerHTML = '';
                tasks.forEach(t => {
                    const isDone = state.completedToday.includes(t.id);
                    const div = document.createElement('div');
                    div.className = 'task';
                    div.innerHTML = `<span>${t.txt}</span><button class="${isDone ? 'btn-done' : 'btn-active'}">${isDone ? '✓' : '+' + t.pts}</button>`;
                    div.querySelector('button').onclick = () => {
                        const idx = state.completedToday.indexOf(t.id);
                        if (idx > -1) {
                            vibrate(30);
                            state.xp = Math.max(0, state.xp - t.pts);
                            state.completedToday.splice(idx, 1);
                        } else {
                            vibrate([60, 40, 60]);
                            state.xp += t.pts;
                            state.completedToday.push(t.id);
                            if (state.completedToday.length === tasks.length) {
                                setTimeout(() => vibrate(300), 500);
                                document.getElementById('congrats-text').innerText = quotes[Math.floor(Math.random() * quotes.length)];
                                document.getElementById('overlay').style.display = 'flex';
                            }
                        }
                        render();
                    };
                    list.appendChild(div);
                });
            }

            document.getElementById('loader').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            render();
        } catch (e) { document.getElementById('loader').innerText = "Ошибка: " + e.message; }
    })();
</script>
</body>
</html>
